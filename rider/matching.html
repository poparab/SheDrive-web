<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheDrive — جارٍ البحث</title>
    <script type="module" src="../shared/components/sd-page.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  </head>

  <body>
    <sd-page
      body-class="app-shell matching-page"
      screen-styles="/rider/styles/rider.css, /rider/styles/matching.css"
      mapbox
    >
      <div class="matching-map" id="map" aria-hidden="true"></div>

      <sd-app-header bar-class="matching-topbar" inner-class="matching-topbar__inner" title-class="matching-topbar__title">
        <sd-button
          data-slot="start"
          type="button"
          variant="ghost"
          icon
          id="cancel-top-btn"
          aria-label="إلغاء والعودة"
          data-i18n-aria-label="matching.cancelAriaLabel"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </sd-button>

        <a href="." class="matching-topbar__logo" aria-label="SheDrive home">
          <img src="../shared/assets/logos/shedrive-logo.svg" alt="SheDrive" height="28" />
        </a>
      </sd-app-header>

      <section class="matching-sheet" role="region" aria-label="جارٍ البحث عن سائقة" aria-live="polite">
        <div class="matching-search">
          <div class="spinner" aria-hidden="true"></div>
          <p class="matching-search__title" data-i18n="matching.title">جارٍ البحث…</p>
          <p class="matching-search__sub" data-i18n="matching.subtitle">نبحث عن سائقة موثوقة قريبة منكِ</p>
        </div>

        <div class="matching-safety" role="note" aria-label="ملاحظة الأمان">
          <svg class="matching-safety__icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
          </svg>
          <span data-i18n="matching.safety">نوافق فقط على السائقات الحاصلات على شارة السلامة الكاملة</span>
        </div>

        <sd-driver-card
          class="matching-driver-card"
          variant="preview"
          name-id="matching-driver-name"
          name-fallback="نورا أحمد"
          rating-id="matching-driver-rating"
          rating-fallback="★★★★★ 4.9"
          vehicle-id="matching-driver-vehicle"
          vehicle-fallback="تويوتا كورولا 2023 — أبيض"
          eta-id="matching-driver-eta"
          eta-fallback="الوصول خلال 4 دقيقة"
          avatar="ن"
        ></sd-driver-card>

        <div class="matching-trip-chip" role="status" aria-label="ملخص الرحلة" id="trip-chip">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
          <span class="matching-trip-chip__text" id="chip-pickup">—</span>
          <span class="matching-trip-chip__sep" aria-hidden="true">←</span>
          <span class="matching-trip-chip__text" id="chip-destination">—</span>
        </div>

        <sd-button type="button" variant="ghost" full id="cancel-btn" data-i18n="matching.cancel">
          إلغاء الطلب
        </sd-button>
      </section>
    </sd-page>

    <script type="module" src="scripts/matching.js"></script>
  </body>
</html>
