<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SheDrive — التحقق من الهوية</title>
    <script type="module" src="../shared/components/sd-page.js"></script>
  </head>

  <body>
    <sd-page body-class="app-shell verify-page" screen-styles="styles/rider.css, styles/verify-identity.css">
      <sd-app-header bar-class="verify-topbar" inner-class="verify-topbar__inner" title-class="verify-topbar__title">
        <a
          data-slot="start"
          href="./index.html"
          class="btn btn--icon btn--ghost verify-topbar__back"
          aria-label="رجوع"
          data-i18n-aria-label="common.back"
        >
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </a>

        <a href="./index.html" class="verify-topbar__logo" aria-label="SheDrive">
          <img src="../shared/assets/logos/shedrive-logo.svg" alt="SheDrive" height="28" />
        </a>
      </sd-app-header>

      <main class="verify-content" role="main">

      <!-- Safety note (shown once, above stepper) -->
      <div class="verify-safety-note" role="note">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        <p data-i18n="verify.subtitle">شي درايف تتحقق من هوية كل راكبة لحماية السائقات والمجتمع</p>
      </div>

      <!-- ── Step indicator ── -->
      <nav class="verify-stepper" aria-label="خطوات التحقق" role="tablist">
        <span
          class="verify-step-dot verify-step-dot--active"
          role="tab"
          aria-selected="true"
          aria-label="الخطوة 1"
          data-step-dot="1"
        ></span>
        <span
          class="verify-step-dot"
          role="tab"
          aria-selected="false"
          aria-label="الخطوة 2"
          data-step-dot="2"
        ></span>
        <span
          class="verify-step-dot"
          role="tab"
          aria-selected="false"
          aria-label="الخطوة 3"
          data-step-dot="3"
        ></span>
      </nav>

      <!-- ── Step 1: National ID Front ── -->
      <section
        class="verify-step verify-step--active"
        data-step="1"
        aria-label="الوجه الأمامي للبطاقة"
        role="tabpanel"
      >
        <h1 class="verify-step__title" data-i18n="verify.step1.title">الوجه الأمامي للبطاقة</h1>
        <p class="verify-step__hint" data-i18n="verify.step1.hint">التقطي صورة واضحة للوجه الأمامي لبطاقة هويتك الوطنية</p>

        <div class="upload-card" id="upload-card-front" role="button" tabindex="0" aria-label="رفع صورة الوجه الأمامي للبطاقة">
          <!-- Camera icon -->
          <svg class="upload-card__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span class="upload-card__label" data-i18n="verify.takePhoto">اضغطي لرفع الصورة</span>
        </div>

        <!-- Hidden file input (capture=environment for back camera) -->
        <input
          type="file"
          accept="image/*"
          capture="environment"
          id="id-front-input"
          aria-label="رفع صورة الوجه الأمامي"
          hidden
        />

        <div class="upload-actions">
          <button
            type="button"
            class="btn btn--primary"
            id="take-photo-front"
            data-i18n="verify.takePhoto"
          >
            التقاط صورة
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="upload-gallery-front"
            data-i18n="verify.uploadGallery"
          >
            رفع من المعرض
          </button>
        </div>
      </section>

      <!-- ── Step 2: National ID Back ── -->
      <section
        class="verify-step"
        data-step="2"
        aria-label="الوجه الخلفي للبطاقة"
        role="tabpanel"
        hidden
      >
        <h1 class="verify-step__title" data-i18n="verify.step2.title">الوجه الخلفي للبطاقة</h1>
        <p class="verify-step__hint" data-i18n="verify.step2.hint">التقطي صورة واضحة للوجه الخلفي لبطاقة هويتك الوطنية</p>

        <div class="upload-card" id="upload-card-back" role="button" tabindex="0" aria-label="رفع صورة الوجه الخلفي للبطاقة">
          <svg class="upload-card__icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
            <circle cx="12" cy="13" r="4"/>
          </svg>
          <span class="upload-card__label" data-i18n="verify.takePhoto">اضغطي لرفع الصورة</span>
        </div>

        <input
          type="file"
          accept="image/*"
          capture="environment"
          id="id-back-input"
          aria-label="رفع صورة الوجه الخلفي"
          hidden
        />

        <div class="upload-actions">
          <button
            type="button"
            class="btn btn--primary"
            id="take-photo-back"
            data-i18n="verify.takePhoto"
          >
            التقاط صورة
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="upload-gallery-back"
            data-i18n="verify.uploadGallery"
          >
            رفع من المعرض
          </button>
        </div>
      </section>

      <!-- ── Step 3: Selfie ── -->
      <section
        class="verify-step"
        data-step="3"
        aria-label="صورة سيلفي"
        role="tabpanel"
        hidden
      >
        <h1 class="verify-step__title" data-i18n="verify.step3.title">صورة سيلفي</h1>
        <p class="verify-step__hint" data-i18n="verify.step3.hint">التقطي صورة واضحة لوجهك في إضاءة جيدة</p>

        <!-- Circular upload card with face silhouette -->
        <div class="upload-card upload-card--circle" id="upload-card-selfie" role="button" tabindex="0" aria-label="رفع صورة سيلفي">
          <!-- Face silhouette SVG -->
          <svg class="upload-card__icon" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="8" r="4"/>
            <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
          </svg>
        </div>

        <input
          type="file"
          accept="image/*"
          capture="user"
          id="selfie-input"
          aria-label="رفع صورة سيلفي"
          hidden
        />

        <div class="upload-actions upload-actions--center">
          <button
            type="button"
            class="btn btn--primary"
            id="take-photo-selfie"
            data-i18n="verify.takePhoto"
          >
            التقاط صورة
          </button>
          <button
            type="button"
            class="btn btn--ghost"
            id="upload-gallery-selfie"
            data-i18n="verify.uploadGallery"
          >
            رفع من المعرض
          </button>
        </div>
      </section>

      </main>

      <footer class="verify-footer">
      <button
        type="button"
        class="btn btn--primary btn--full"
        id="cta-btn"
        data-i18n="verify.continue"
      >
        متابعة
      </button>
      </footer>
    </sd-page>

    <script type="module" src="scripts/verify-identity.js"></script>
  </body>
</html>
