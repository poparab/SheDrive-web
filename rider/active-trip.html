<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SheDrive — رحلتك الآن" />
    <title>SheDrive — رحلتك الآن</title>

    <!-- CSS — explicit links so the page renders when opened directly (file://). -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/reset.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <link rel="stylesheet" href="../shared/styles/components.css" />
    <link rel="stylesheet" href="../shared/styles/utilities.css" />
    <link rel="stylesheet" href="../shared/styles/f7-overrides.css" />
    <link rel="stylesheet" href="../shared/styles/web-components.css" />
    <link rel="stylesheet" href="../shared/styles/rtl.css" />
    <link rel="stylesheet" href="../shared/styles/drawer.css" />
    <link rel="stylesheet" href="styles/rider.css" />
    <link rel="stylesheet" href="styles/trip.css" />
    <link rel="stylesheet" href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" />

    <script type="module" src="../shared/components/sd-page.js"></script>
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>
  </head>

  <body class="app-shell trip-page">
    <sd-page
      body-class="app-shell trip-page"
      screen-styles="styles/rider.css, styles/trip.css"
      drawer
      mapbox
    >
      <sd-app-header
        menu
        bar-class="trip-topbar"
        inner-class="trip-topbar__inner"
        actions-class="trip-topbar__actions"
        title-class="trip-topbar__title"
      >
        <a href="home.html" class="trip-topbar__logo" data-i18n-aria-label="aria.logo.shedrive">
          <img src="../shared/assets/logos/shedrive-logo.svg" alt="SheDrive" height="28" />
        </a>
      </sd-app-header>

      <div class="trip-map" role="img" aria-label="خريطة الرحلة" data-i18n-aria-label="aria.map.trip">
        <div id="map"></div>
      </div>

      <section class="trip-panel" aria-label="تفاصيل السائقة والرحلة" data-i18n-aria-label="trip.title">

        <!-- ── Driver Arrived banner (state=arrived) ──── -->
        <div class="state--arrived trip-arrived-banner" role="status" aria-live="assertive">
          <span class="trip-arrived-banner__icon" aria-hidden="true">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
          </span>
          <div class="trip-arrived-banner__text">
            <p class="trip-arrived-banner__title" data-i18n="trip.arrived.title">وصلت سائقتك!</p>
            <p class="trip-arrived-banner__body" data-i18n="trip.arrived.body">توجهي إلى نقطة الالتقاء</p>
          </div>
        </div>

        <sd-driver-card
          variant="detailed"
          name-id="driver-name"
          name-fallback="نورا أحمد"
          rating-id="driver-rating"
          rating-fallback="★★★★★ 4.9"
          vehicle-id="driver-vehicle"
          vehicle-fallback="تويوتا كورولا 2023 — أبيض | ق أ ب 123"
          eta-id="driver-eta"
          eta-fallback="الوصول خلال 4 دقيقة"
          avatar="ن"
        ></sd-driver-card>

        <div class="safety-badges" role="list" data-i18n-aria-label="aria.trip.safetyBadges">
          <span class="safety-badge" role="listitem">
            <span aria-hidden="true">🎥</span>
            <span data-i18n="trip.badge.camera">كاميرا مباشرة</span>
          </span>
          <span class="safety-badge" role="listitem">
            <span aria-hidden="true">✓</span>
            <span data-i18n="trip.badge.verified">سائقة موثقة</span>
          </span>
          <span class="safety-badge" role="listitem">
            <span aria-hidden="true">✚</span>
            <span data-i18n="trip.badge.firstAid">إسعافات أولية</span>
          </span>
        </div>

        <div class="trip-actions" role="group" data-i18n-aria-label="aria.trip.actions">

          <button
            type="button"
            id="call-btn"
            class="btn btn--secondary btn--icon"
            data-i18n-aria-label="aria.call"
            aria-label="اتصال بالسائقة"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.41 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.34 1h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
            </svg>
          </button>

          <button
            type="button"
            id="message-btn"
            class="btn btn--secondary btn--icon"
            data-i18n-aria-label="aria.message"
            aria-label="رسالة للسائقة"
          >
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
          </button>

          <button
            type="button"
            id="sos-btn"
            class="btn btn--sos"
            data-i18n-aria-label="aria.sos"
            aria-label="زر الطوارئ"
          >
            <span data-i18n="trip.sos">🆘 طوارئ</span>
          </button>

        </div>

        <div class="trip-details">
          <button
            type="button"
            id="trip-details-toggle"
            class="trip-details-toggle"
            aria-expanded="false"
            aria-controls="trip-details-body"
          >
            <span data-i18n="trip.details">تفاصيل الرحلة</span>
            <svg class="icon-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>

          <div id="trip-details-body" class="trip-details-body" role="region" data-i18n-aria-label="aria.trip.details">
            <div class="trip-detail-row">
              <span class="trip-detail-row__label" data-i18n="home.pickup.label">نقطة الانطلاق</span>
              <span class="trip-detail-row__value" id="detail-pickup">موقعي الحالي</span>
            </div>

            <div class="trip-detail-row">
              <span class="trip-detail-row__label" data-i18n="home.destination.label">الوجهة</span>
              <span class="trip-detail-row__value" id="detail-destination">مدينة نصر</span>
            </div>

            <div class="trip-detail-row">
              <span class="trip-detail-row__label" data-i18n="trip.fare">التكلفة التقديرية</span>
              <span class="trip-detail-row__value">٤٥–٦٠ جنيه</span>
            </div>

            <div class="trip-detail-row">
              <span class="trip-detail-row__label" data-i18n="trip.distance">المسافة</span>
              <span class="trip-detail-row__value">~8 كم</span>
            </div>

            <button
              type="button"
              id="demo-end-btn"
              class="btn btn--secondary btn--full btn--sm trip-details-demo"
              data-i18n="trip.demoEnd"
            >
              محاكاة انتهاء الرحلة (تجريبي)
            </button>
          </div>
        </div>
      </section>

      <div
        class="sos-modal-backdrop"
        id="sos-modal"
        role="dialog"
        aria-modal="true"
        aria-labelledby="sos-modal-title"
        aria-describedby="sos-modal-body"
      >
        <div class="sos-modal">
          <h2 class="sos-modal__title" id="sos-modal-title" data-i18n="trip.sosConfirmTitle">تأكيد طوارئ</h2>
          <p class="sos-modal__body" id="sos-modal-body" data-i18n="trip.sosConfirmBody">
            هل تريدين إبلاغ مركز السلامة الآن؟ سيتم إخطار الجهات المختصة فوراً.
          </p>
          <div class="sos-modal__actions">
            <button
              type="button"
              id="sos-confirm"
              class="btn btn--danger"
              data-i18n="trip.sosConfirm"
            >
              نعم، أرسلي الإبلاغ
            </button>
            <button
              type="button"
              id="sos-cancel"
              class="btn btn--ghost btn--full"
              data-i18n="trip.sosCancel"
            >
              إلغاء
            </button>
          </div>
        </div>
      </div>
    </sd-page>

    <script type="module" src="scripts/active-trip.js"></script>

    <!-- Demo only: ?state=arrived -->
    <script type="module">
      const s = new URLSearchParams(location.search).get('state');
      if (s) document.body.dataset.state = s;
    </script>
  </body>
</html>
