<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SheDrive Driver — لوحة تحكم السائقة" />
    <title>SheDrive Driver — الرئيسية</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Mapbox GL JS -->
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>

    <!-- Design system -->
    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/reset.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <link rel="stylesheet" href="../shared/styles/components.css" />
    <link rel="stylesheet" href="../shared/styles/utilities.css" />
    <link rel="stylesheet" href="styles/driver.css" />

    <!-- RTL override -->
    <link id="rtl-stylesheet" rel="stylesheet" href="../shared/styles/rtl.css" />
  </head>

  <body class="app-shell driver-home-page">

    <!-- ── Full-screen map ── -->
    <main class="home-map-container" id="map" aria-label="Cairo map" role="main"></main>

    <!-- ── Top control bar ── -->
    <header class="driver-topbar" role="banner">
      <div class="driver-topbar__inner">

        <!-- Online / Offline toggle -->
        <button
          type="button"
          class="toggle-pill"
          id="online-toggle"
          aria-pressed="false"
          aria-label="Go online"
          data-i18n-aria-label="driver.goOnline"
        >
          <span class="toggle-pill__dot" aria-hidden="true"></span>
          <span class="toggle-pill__label" id="online-label" data-i18n="driver.offline">
            غير متصلة
          </span>
        </button>

        <!-- Earnings chip -->
        <div class="chip driver-earnings" id="earnings-chip" aria-label="Earnings today: 0 EGP">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="12" y1="1" x2="12" y2="23"/>
            <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
          </svg>
          <span>
            <span data-i18n="driver.earningsToday">أرباح اليوم</span>:
            <strong id="earnings-amount">0</strong>
            <span data-i18n="driver.currency">جنيه</span>
          </span>
        </div>

        <!-- Language switcher -->
        <nav class="lang-switcher" aria-label="Language / اللغة">
          <button class="lang-switcher__btn" data-lang-btn="ar" aria-pressed="true" type="button">AR</button>
          <span class="lang-switcher__sep" aria-hidden="true">|</span>
          <button class="lang-switcher__btn" data-lang-btn="en" aria-pressed="false" type="button">EN</button>
        </nav>
      </div>
    </header>

    <!-- ── Working Zones button (floating) ── -->
    <div class="driver-zones-btn-wrap">
      <button
        type="button"
        class="btn btn--secondary driver-zones-btn"
        id="working-zones-btn"
        data-i18n="driver.workingZones"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polygon points="3 11 22 2 13 21 11 13 3 11"/>
        </svg>
        <span>مناطق العمل</span>
      </button>
    </div>

    <!-- ── Bottom status bar ── -->
    <footer class="driver-statusbar" role="contentinfo">
      <div class="driver-statusbar__inner">
        <img
          src="../shared/assets/logos/shedrive-icon.svg"
          alt="SheDrive"
          class="driver-statusbar__logo"
          width="32"
          height="32"
        />

        <p class="driver-statusbar__status" id="driver-status" aria-live="polite" aria-atomic="true">
          <span data-i18n="driver.status.offline">أنتِ غير متصلة</span>
        </p>

        <button
          type="button"
          class="btn btn--icon btn--ghost"
          aria-label="Profile"
          data-i18n-aria-label="nav.profile"
          id="profile-btn"
        >
          <div class="avatar" aria-hidden="true">D</div>
        </button>
      </div>
    </footer>

    <!-- ── Location loading indicator ── -->
    <div
      class="location-status"
      id="location-status"
      role="status"
      aria-live="polite"
      aria-atomic="true"
    >
      <div class="spinner" aria-hidden="true"></div>
      <span data-i18n="home.gettingLocation">جارٍ تحديد موقعك…</span>
    </div>

    <div class="toast-container" id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <script type="module" src="scripts/home.js" defer></script>
  </body>
</html>
