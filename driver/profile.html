<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SheDrive — الملف الشخصي للسائقة" />
    <title>SheDrive Driver — الملف الشخصي</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/reset.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <link rel="stylesheet" href="../shared/styles/components.css" />
    <link rel="stylesheet" href="../shared/styles/utilities.css" />
    <link rel="stylesheet" href="../shared/styles/f7-overrides.css" />
    <link rel="stylesheet" href="../shared/styles/web-components.css" />
    <link rel="stylesheet" href="../shared/styles/rtl.css" />
    <link rel="stylesheet" href="styles/driver.css" />
    <link rel="stylesheet" href="styles/profile.css" />

    <script type="module" src="../shared/components/sd-page.js"></script>
  </head>

  <body class="app-shell driver-profile-page">
    <sd-page body-class="app-shell driver-profile-page" screen-styles="styles/driver.css, styles/profile.css">

      <!-- Top bar with back button -->
      <sd-app-header hide-lang-toggle>
        <a href="./home.html" class="btn btn--icon btn--ghost" slot="start"
          data-slot="start" aria-label="رجوع" data-i18n-aria-label="aria.back">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </a>
        <span data-i18n="driverProfile.title">ملفي الشخصي</span>
      </sd-app-header>

      <main class="driver-profile-main">

        <!-- ── Avatar + name header ── -->
        <div class="dprofile-hero">
          <div class="avatar avatar--xl dprofile-hero__avatar" aria-hidden="true" id="hero-avatar">س</div>
          <div class="dprofile-hero__info">
            <p class="dprofile-hero__name" id="hero-name">سارة محمد</p>
            <div class="dprofile-hero__rating" aria-label="التقييم: 4.9 نجوم" data-i18n-aria-label="aria.rating">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
              </svg>
              <span>4.9</span>
            </div>
          </div>
        </div>

        <!-- ── Editable fields ── -->
        <section class="dprofile-section card" aria-label="البيانات الشخصية" data-i18n-aria-label="driverProfile.section.personal">

          <!-- Phone (read-only) -->
          <div class="field">
            <label class="field__label" for="dprofile-phone" data-i18n="driverProfile.phone.label">رقم الهاتف</label>
            <input type="tel" id="dprofile-phone" class="input" readonly aria-readonly="true" value="+20 0100 000 0000" dir="ltr" />
            <span class="field__hint" data-i18n="driverProfile.phone.hint">لا يمكن تغيير رقم الهاتف</span>
          </div>

          <!-- Full name (editable) -->
          <div class="field">
            <label class="field__label" for="dprofile-name" data-i18n="driverProfile.name.label">الاسم الكامل</label>
            <input type="text" id="dprofile-name" class="input" autocomplete="name" aria-required="true" aria-describedby="dprofile-name-error" value="سارة محمد" />
            <span id="dprofile-name-error" class="field__error" role="alert" hidden></span>
          </div>

          <!-- Language selector — live switch (#1731) -->
          <div class="field">
            <label class="field__label" data-i18n="driverProfile.language.label">اللغة</label>
            <div class="dprofile-lang-row" role="group" aria-label="اختيار اللغة" data-i18n-aria-label="driverProfile.language.label">
              <button type="button" class="btn btn--ghost dprofile-lang-btn" data-lang-btn="ar" aria-pressed="true" data-i18n="driverProfile.language.ar">
                العربية
              </button>
              <button type="button" class="btn btn--ghost dprofile-lang-btn" data-lang-btn="en" aria-pressed="false" data-i18n="driverProfile.language.en">
                English
              </button>
            </div>
          </div>

          <button type="button" class="btn btn--primary btn--full" id="dprofile-save-btn" data-i18n="driverProfile.save">
            حفظ التغييرات
          </button>
        </section>

        <!-- ── Quick links ── -->
        <section class="dprofile-section card dprofile-links" aria-label="الروابط السريعة" data-i18n-aria-label="driverProfile.links.label">
          <a href="./earnings.html" class="profile-sheet__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
            </svg>
            <span data-i18n="nav.earnings">الأرباح</span>
            <svg class="dprofile-links__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          </a>
          <a href="./history.html" class="profile-sheet__link">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M3 3h18v18H3z"/><path d="M3 9h18M9 21V9"/>
            </svg>
            <span data-i18n="nav.history">سجل الرحلات</span>
            <svg class="dprofile-links__arrow" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 18 15 12 9 6"/></svg>
          </a>
        </section>

        <!-- ── Danger zone ── -->
        <section class="dprofile-section" aria-label="إجراءات الحساب">
          <button type="button" class="btn btn--danger btn--full" id="dprofile-logout-btn" data-i18n="driverProfile.logout">
            تسجيل الخروج
          </button>
        </section>

      </main>
    </sd-page>

    <script type="module" src="scripts/profile.js"></script>
  </body>
</html>
