<!doctype html>
<html dir="rtl" lang="ar">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="SheDrive Driver — تفاصيل الرحلة" />
    <title>SheDrive Driver — تفاصيل الرحلة</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />

    <link href="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.css" rel="stylesheet" />
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.6.0/mapbox-gl.js"></script>

    <link rel="stylesheet" href="../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../shared/styles/reset.css" />
    <link rel="stylesheet" href="../shared/styles/base.css" />
    <link rel="stylesheet" href="../shared/styles/components.css" />
    <link rel="stylesheet" href="../shared/styles/utilities.css" />
    <link rel="stylesheet" href="styles/driver.css" />
    <link rel="stylesheet" href="styles/trip-detail.css" />
    <link id="rtl-stylesheet" rel="stylesheet" href="../shared/styles/rtl.css" />
  </head>

  <body class="app-shell driver-trip-detail-page">

    <div id="toast-container" aria-live="polite" aria-atomic="true"></div>

    <!-- ── Top bar ── -->
    <header class="dtd-topbar">
      <div class="dtd-topbar__inner">
        <a
          href="./history.html"
          class="btn btn--icon btn--ghost"
          aria-label="رجوع"
          data-i18n-aria-label="aria.back"
        >
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
        </a>
        <span class="dtd-topbar__title" data-i18n="driver.tripDetail.title">تفاصيل الرحلة</span>
      </div>
    </header>

    <!-- ── Scrollable content ── -->
    <main
      class="dtd-content"
      aria-label="تفاصيل رحلة سابقة"
      data-i18n-aria-label="aria.driver.tripDetail"
    >

      <!-- ── Static route map ── -->
      <div
        class="dtd-map"
        id="map"
        role="img"
        aria-label="خريطة مسار الرحلة"
        data-i18n-aria-label="aria.map.trip"
      ></div>

      <!-- ── Date & time ── -->
      <section class="dtd-card dtd-datetime" aria-label="تاريخ ووقت الرحلة">
        <span class="dtd-card__label" data-i18n="tripDetail.date">التاريخ والوقت</span>
        <span class="dtd-card__value dtd-datetime__value">الإثنين، ٢ يونيو ٢٠٢٦ — ٠٩:٣٤ ص</span>
      </section>

      <!-- ── Route ── -->
      <section class="dtd-card dtd-route" aria-label="مسار الرحلة">
        <div class="dtd-route__row dtd-route__row--pickup">
          <span class="dtd-route__dot dtd-route__dot--green" aria-hidden="true"></span>
          <div class="dtd-route__text">
            <span class="dtd-route__label" data-i18n="home.pickup.label">نقطة الانطلاق</span>
            <span class="dtd-route__address">المعادي، القاهرة — شارع ٩</span>
          </div>
        </div>
        <div class="dtd-route__connector" aria-hidden="true"></div>
        <div class="dtd-route__row">
          <span class="dtd-route__dot dtd-route__dot--magenta" aria-hidden="true"></span>
          <div class="dtd-route__text">
            <span class="dtd-route__label" data-i18n="home.destination.label">الوجهة</span>
            <span class="dtd-route__address">مدينة نصر — سيتي ستارز</span>
          </div>
        </div>
      </section>

      <!-- ── Rider card (compact) ── -->
      <div class="dtd-card dtd-rider" aria-label="بيانات الراكبة">
        <div class="avatar avatar--md" aria-hidden="true">ن</div>
        <div class="dtd-rider__info">
          <span class="dtd-rider__name">نور أحمد</span>
          <div class="dtd-rider__rating" aria-label="تقييم ٤.٨">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
            <span>4.8</span>
          </div>
        </div>
      </div>

      <!-- ── Fare breakdown ── -->
      <section class="dtd-card dtd-fare" aria-label="تفاصيل السعر">
        <h3 class="dtd-fare__title" data-i18n="tripDetail.fareBreakdown">تفاصيل السعر</h3>
        <div class="dtd-fare__row">
          <span data-i18n="tripDetail.base">السعر الأساسي</span>
          <span>٥ ج.م.</span>
        </div>
        <div class="dtd-fare__row">
          <span data-i18n="tripDetail.distanceFare">رسوم المسافة</span>
          <span>٤٠ ج.م.</span>
        </div>
        <div class="dtd-fare__row">
          <span data-i18n="tripDetail.durationFare">رسوم الوقت</span>
          <span>٢٠ ج.م.</span>
        </div>
        <div class="dtd-fare__divider" role="separator" aria-hidden="true"></div>
        <div class="dtd-fare__row dtd-fare__row--total">
          <span data-i18n="tripDetail.total">الإجمالي</span>
          <span class="dtd-fare__total-amount">٦٥ ج.م.</span>
        </div>
      </section>

      <!-- ── Rating received ── -->
      <section class="dtd-card dtd-rating" aria-label="تقييم الراكبة">
        <h3 class="dtd-rating__title" data-i18n="driver.tripDetail.riderRating">تقييم الراكبة لكِ</h3>
        <div class="dtd-rating__stars" aria-label="٥ نجوم من ٥" role="img">
          <span class="dtd-star dtd-star--filled" aria-hidden="true">★</span>
          <span class="dtd-star dtd-star--filled" aria-hidden="true">★</span>
          <span class="dtd-star dtd-star--filled" aria-hidden="true">★</span>
          <span class="dtd-star dtd-star--filled" aria-hidden="true">★</span>
          <span class="dtd-star dtd-star--filled" aria-hidden="true">★</span>
        </div>
      </section>

      <!-- ── Trip reference ── -->
      <p class="dtd-ref">
        <span data-i18n="tripDetail.ref">رقم الرحلة</span>
        <span class="dtd-ref__id">#SDR-20260602-0042</span>
      </p>

    </main>

    <script type="module" src="scripts/trip-detail.js"></script>
  </body>
</html>
